version: "3.9"

services:
  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend

  # ── Backend (API Gateway + Lambda emulated locally) ───────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=denguewatch
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - SQS_QUEUE_URL=http://localstack:4566/000000000000/risk-change-queue
      - SNS_TOPIC_ARN=arn:aws:sns:ap-southeast-1:000000000000:dengue-notifications
    depends_on:
      - postgres
      - localstack

  # ── Data Ingestion Lambda (local runner) ─────────────────────────────────
  data-ingestion:
    build:
      context: ./data-ingestion
      dockerfile: Dockerfile
    volumes:
      - ./data-ingestion:/app
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=denguewatch
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - NEA_API_KEY=${NEA_API_KEY:-placeholder}
    depends_on:
      - postgres
    profiles:
      - ingestion   # run with: docker-compose --profile ingestion up

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: denguewatch
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql

  # ── LocalStack (AWS services emulation) ──────────────────────────────────
  localstack:
    image: localstack/localstack:3
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,sqs,sns,lambda,events
      - DEBUG=0
      - DEFAULT_REGION=ap-southeast-1
    volumes:
      - localstack_data:/var/lib/localstack

volumes:
  postgres_data:
  localstack_data:
